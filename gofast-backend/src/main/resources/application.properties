spring.application.name=gofast-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/gofast_db
spring.datasource.username=root
spring.datasource.password=mysql1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server Configuration
server.port=5500
server.servlet.context-path=/api

# JWT Configuration
app.jwtSecret=MySecureSecretKeyForJWTTokenValidationThatIsAtLeast32CharsLong12345
app.jwtExpirationMs=3600000
app.refreshTokenExpirationMs=2592000000

# Logging
logging.level.root=INFO
logging.level.com.gofast=DEBUG
