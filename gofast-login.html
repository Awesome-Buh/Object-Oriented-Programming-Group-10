<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoFast • Login or Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #0a0a0b;
            --panel: #1a1a24;
            --orange: #ff5c1a;
            --white: #f5f4f0;
            --muted: rgba(245, 244, 240, 0.55);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 5%;
            background: rgba(10, 10, 11, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            text-decoration: none;
        }

        .logo-mark {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--orange);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            color: #fff;
        }

        .logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.7rem;
            letter-spacing: 0.08em;
            color: var(--white);
        }

        .logo-text span {
            color: var(--orange);
        }

        .btn {
            padding: 0.6rem 1.4rem;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.88rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-primary {
            background: var(--orange);
            border: 1px solid var(--orange);
            color: #fff;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
        }

        .container {
            max-width: 1280px;
            margin: 2rem auto;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: start;
        }

        .form-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2rem;
        }

        .form-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 2.4rem;
            text-transform: uppercase;
        }

        .form-header h1 em {
            font-style: normal;
            color: var(--orange);
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.85rem 1rem;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
        }

        .auth-btn {
            width: 100%;
            margin-top: 0.75rem;
            padding: 0.9rem;
            font-weight: 600;
            border-radius: 40px;
        }

        .toggle-text {
            text-align: center;
            margin-top: 1.8rem;
            color: var(--muted);
            font-size: 0.85rem;
        }

        .toggle-link {
            color: var(--orange);
            font-weight: 600;
            cursor: pointer;
        }

        .error-message {
            background: rgba(255, 60, 30, 0.12);
            border-left: 3px solid #ff3c1e;
            padding: 0.7rem 1rem;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #ff8a6a;
            margin-top: 1rem;
            display: none;
        }

        .city-gallery {
            background: rgba(26, 26, 36, 0.5);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            background: var(--border);
        }

        .city-tile {
            position: relative;
            aspect-ratio: 1 / 0.9;
            overflow: hidden;
        }

        .city-tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7);
        }

        .city-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            padding: 1rem 0.8rem 0.6rem;
            font-weight: 700;
            font-size: 0.85rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
            color: var(--muted);
            font-size: 0.75rem;
        }

        @media (max-width:860px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav>
        <a href="gofast-landing.html" class="nav-logo">
            <div class="logo-mark">GF</div><span class="logo-text">Go<span>Fast</span></span>
        </a>
        <div class="nav-cta"><a href="gofast-working.html" class="btn btn-outline">Working Page</a><a
                href="gofast-login.html" class="btn btn-primary">Sign Up</a></div>
    </nav>
    <main>
        <div class="container">
            <div class="form-card">
                <div class="form-header">
                    <h1><em>GoFast</em> Access</h1>
                    <p id="formSubtext">Log in to continue your journey</p>
                </div>
                <div id="signupNameGroup" class="input-group" style="display:none;"><label>Full name</label><input
                        type="text" id="fullName" placeholder="e.g., Nadia Y."></div>
                <div class="input-group"><label>Email address</label><input type="email" id="email"
                        placeholder="you@example.com"></div>
                <div class="input-group"><label>Password</label><input type="password" id="password"
                        placeholder="••••••••"></div>
                <button id="actionButton" class="btn btn-primary auth-btn">Log In</button>
                <div id="errorBox" class="error-message"></div>
                <div class="toggle-text"><span id="togglePrompt">Don't have an account?</span> <span id="toggleLink"
                        class="toggle-link">Create one</span></div>
            </div>
            <div class="city-gallery">
                <div class="gallery-grid">
                    <div class="city-tile"><img src="https://images.unsplash.com/photo-1595435742656-5272d0b3fa82?w=500"
                            alt="Douala">
                        <div class="city-label">Douala</div>
                    </div>
                    <div class="city-tile"><img src="https://images.unsplash.com/photo-1547981609-4b6bfe67ca0b?w=500"
                            alt="Yaoundé">
                        <div class="city-label">Yaoundé</div>
                    </div>
                    <div class="city-tile"><img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=500"
                            alt="Buea">
                        <div class="city-label">Buea</div>
                    </div>
                    <div class="city-tile"><img src="https://images.unsplash.com/photo-1519451241324-20b4ea2c4220?w=500"
                            alt="Limbe">
                        <div class="city-label">Limbe</div>
                    </div>
                    <div class="city-tile"><img src="https://images.unsplash.com/photo-1466442929976-97f336a657be?w=500"
                            alt="Bafoussam">
                        <div class="city-label">Bafoussam</div>
                    </div>
                    <div class="city-tile"><img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=500"
                            alt="Bamenda">
                        <div class="city-label">Bamenda</div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>© 2025 GoFast Technologies Ltd — Tickets at your fingertips 🇨🇲</footer>
    <script>
        const signupNameGroup = document.getElementById('signupNameGroup');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const actionBtn = document.getElementById('actionButton');
        const errorBox = document.getElementById('errorBox');
        const togglePrompt = document.getElementById('togglePrompt');
        const toggleLink = document.getElementById('toggleLink');
        const formSubtext = document.getElementById('formSubtext');
        let isLoginMode = true;
        function showError(msg) { errorBox.textContent = msg; errorBox.style.display = 'block'; setTimeout(() => errorBox.style.display = 'none', 3500); }
        function updateUIMode() {
            if (isLoginMode) {
                signupNameGroup.style.display = 'none';
                actionBtn.textContent = 'Log In →';
                togglePrompt.textContent = "Don't have an account?";
                toggleLink.textContent = 'Create one';
                formSubtext.textContent = 'Log in to continue your journey';
            } else {
                signupNameGroup.style.display = 'block';
                actionBtn.textContent = 'Create account →';
                togglePrompt.textContent = "Already have an account?";
                toggleLink.textContent = 'Log in';
                formSubtext.textContent = 'Join GoFast and start booking';
            }
        }
        function getUsers() { return JSON.parse(localStorage.getItem('goFastUsers') || '[]'); }
        function saveUsers(users) { localStorage.setItem('goFastUsers', JSON.stringify(users)); }
        function login(email, password) {
            const users = getUsers();
            const found = users.find(u => u.email === email && u.password === password);
            if (found) {
                localStorage.setItem('goFastUser', JSON.stringify({ name: found.name, email: found.email }));
                return true;
            }
            return false;
        }
        function signup(name, email, password) {
            const users = getUsers();
            if (users.find(u => u.email === email)) return { success: false, error: 'Email already registered.' };
            const newUser = { name, email, password };
            users.push(newUser);
            saveUsers(users);
            localStorage.setItem('goFastUser', JSON.stringify({ name, email }));
            return { success: true };
        }
        function handleAuth() {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            if (!email || !password) { showError('Email and password required.'); return; }
            if (isLoginMode) {
                if (login(email, password)) {
                    // ADMIN REDIRECT
                    if (email.toLowerCase() === 'admin2@gmail.com') window.location.href = 'gofast-admin.html';
                    else window.location.href = 'gofast-working.html';
                } else showError('Invalid credentials.');
            } else {
                const fullName = fullNameInput.value.trim();
                if (!fullName) { showError('Full name required.'); return; }
                const result = signup(fullName, email, password);
                if (result.success) {
                    if (email.toLowerCase() === 'admin2@gmail.com') window.location.href = 'gofast-admin.html';
                    else window.location.href = 'gofast-working.html';
                } else showError(result.error);
            }
        }
        function toggleMode() { isLoginMode = !isLoginMode; updateUIMode(); errorBox.style.display = 'none'; passwordInput.value = ''; }
        actionBtn.addEventListener('click', handleAuth);
        toggleLink.addEventListener('click', toggleMode);
        updateUIMode();
    </script>
</body>

</html>
