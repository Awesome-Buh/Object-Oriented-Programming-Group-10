
spring.application.name=page
server.port=8081

# 1. Correct Lowercase Database URL
spring.datasource.url=jdbc:postgresql://localhost:5432/ticketdb
spring.datasource.username=postgres
# Add your local postgres database password below if you have one set:
 spring.datasource.password=12345678

# 2. Complete SQL Script Initialization Shutdown (Spring Boot 4 Standard)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# 3. Hibernate Schema Generation Rules
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. Driver & Dialect Layout mappings
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


